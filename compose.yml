services:
  chromadb:
    image: chromadb/chroma:1.5.4
    restart: unless-stopped
    init: true
    volumes:
      - ${CHROMA_DATA_DIR}:/data
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
      TUNNEL_MANAGEMENT_DIAGNOSTICS: "false"
    depends_on:
      chromadb:
        condition: service_started
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge
